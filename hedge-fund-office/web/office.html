<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Sentinel — Virtual HQ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#050c1a;color:#dce8f5;font-family:'Segoe UI',system-ui,sans-serif;overflow:hidden;height:100vh;display:flex;flex-direction:column}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,180,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,180,255,.03) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}

.topbar{display:flex;align-items:center;padding:0 20px;height:52px;background:rgba(5,12,26,.95);border-bottom:1px solid rgba(255,184,0,.25);backdrop-filter:blur(12px);z-index:10;flex-shrink:0;gap:12px}
.logo-icon{width:26px;height:26px;border:2px solid #ffb800;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;color:#ffb800;font-weight:900;flex-shrink:0}
.logo-text{font-size:16px;font-weight:900;color:#ffb800;letter-spacing:3px}
.logo-sub{font-size:9px;color:#6b8aaa;letter-spacing:1px;margin-left:2px}
.topbar-actions{display:flex;gap:8px;margin-left:auto;align-items:center}
.btn{background:rgba(255,184,0,.1);border:1px solid rgba(255,184,0,.3);color:#ffb800;padding:5px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;text-decoration:none;transition:all .2s;letter-spacing:.5px}
.btn:hover{background:rgba(255,184,0,.2)}
.btn-sec{background:rgba(0,200,255,.08);border:1px solid rgba(0,200,255,.25);color:#00c8ff}
.btn-sec:hover{background:rgba(0,200,255,.15)}
.clock{font-size:12px;color:#6b8aaa;font-family:monospace;letter-spacing:1px}

.canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
canvas{cursor:crosshair;display:block;touch-action:none}

/* Agent Info Card */
.agent-card{position:absolute;background:rgba(9,20,36,.95);border:1px solid rgba(255,184,0,.35);border-radius:14px;padding:16px 18px;min-width:220px;max-width:280px;backdrop-filter:blur(16px);box-shadow:0 8px 40px rgba(0,0,0,.6);z-index:50;pointer-events:none;transition:opacity .2s;opacity:0}
.agent-card.show{opacity:1}
.ac-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.ac-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:900;flex-shrink:0;border:2px solid}
.ac-name{font-size:14px;font-weight:800;line-height:1.2}
.ac-role{font-size:10px;color:#6b8aaa;text-transform:uppercase;letter-spacing:.8px;margin-top:2px}
.ac-divider{border-top:1px solid rgba(255,255,255,.07);margin:8px 0}
.ac-stat{display:flex;justify-content:space-between;font-size:11px;margin-bottom:5px}
.ac-stat-label{color:#6b8aaa}
.ac-stat-val{font-weight:700}
.ac-status{display:inline-flex;align-items:center;gap:5px;font-size:10px;margin-top:6px}
.status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* Legend */
.legend{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:16px;background:rgba(5,12,26,.85);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:7px 18px;backdrop-filter:blur(8px)}
.leg-item{display:flex;align-items:center;gap:6px;font-size:10px;color:#6b8aaa}
.leg-dot{width:8px;height:8px;border-radius:50%}

/* Room labels */
.hint{position:absolute;bottom:50px;right:20px;font-size:10px;color:rgba(255,255,255,.25);letter-spacing:.5px}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo-icon">⬡</div>
  <div>
    <div class="logo-text">SENTINEL</div>
    <div class="logo-sub">Virtual HQ — 3 Floors · 10 Agents</div>
  </div>
  <div class="topbar-actions">
    <span class="clock" id="clock">--:--:--</span>
    <a href="index.html" class="btn">📊 Portfolio Dashboard</a>
    <a href="#" class="btn btn-sec" onclick="toggleInfo()">ℹ️ Help</a>
  </div>
</div>

<div class="canvas-wrap">
  <canvas id="office"></canvas>

  <div class="agent-card" id="agent-card">
    <div class="ac-header">
      <div class="ac-avatar" id="ac-avatar"></div>
      <div>
        <div class="ac-name" id="ac-name"></div>
        <div class="ac-role" id="ac-role"></div>
      </div>
    </div>
    <div class="ac-divider"></div>
    <div class="ac-stat"><span class="ac-stat-label">Zone</span><span class="ac-stat-val" id="ac-zone"></span></div>
    <div class="ac-stat"><span class="ac-stat-label">Specialization</span><span class="ac-stat-val" id="ac-spec"></span></div>
    <div class="ac-stat"><span class="ac-stat-label">Current Task</span><span class="ac-stat-val" id="ac-task" style="color:#ffb800"></span></div>
    <div class="ac-divider"></div>
    <div class="ac-status">
      <div class="status-dot" style="background:#00e676;box-shadow:0 0 6px #00e676"></div>
      <span style="color:#00e676;font-weight:700">Active</span>
      <span style="color:#344f6a;margin-left:4px" id="ac-since"></span>
    </div>
  </div>

  <div class="legend">
    <div class="leg-item"><div class="leg-dot" style="background:#ffb800"></div>Fund Manager</div>
    <div class="leg-item"><div class="leg-dot" style="background:#a855f7"></div>Quant</div>
    <div class="leg-item"><div class="leg-dot" style="background:#00c8ff"></div>Research</div>
    <div class="leg-item"><div class="leg-dot" style="background:#ff6b35"></div>Risk</div>
    <div class="leg-item"><div class="leg-dot" style="background:#00e676"></div>Execution</div>
  </div>

  <div class="hint">Click on an agent to view details</div>
</div>

<script>
/* ════════════════════════════════════════════
   SENTINEL VIRTUAL HQ — ISOMETRIC CANVAS
════════════════════════════════════════════ */
const canvas = document.getElementById('office');
const ctx = canvas.getContext('2d');

// ── Internal resolution ──
const IW = 1280, IH = 680;

// ── Isometric tile dimensions ──
const TW = 60, TH = 30, WH = 78;

// ── Resize canvas to fit viewport ──
const wrap = canvas.parentElement;
function resize() {
  const ww = wrap.clientWidth, wh = wrap.clientHeight;
  const scale = Math.min(ww / IW, wh / IH, 1.4);
  canvas.width = IW; canvas.height = IH;
  canvas.style.width = (IW * scale) + 'px';
  canvas.style.height = (IH * scale) + 'px';
  canvas._scale = scale;
}
resize();
window.addEventListener('resize', resize);

// ── Isometric projection helpers ──
function ix(col, row, ox) { return ox + (col - row) * TW / 2; }
function iy(col, row, oy) { return oy + (col + row) * TH / 2; }

// ── Agent definitions ──
const AGENTS = [
  // Floor 3 — Trading Command Center
  { name: 'Victoria Chen',  emoji: '👩', role: 'Fund Manager',    zone: 'Trading Command',  spec: 'Portfolio Strategy',  task: 'Reviewing Q2 Report',    color: '#ffb800', room: 0, col: 4.5, row: 2.5 },
  { name: 'Kenji Tanaka',   emoji: '👨', role: 'Quant Analyst',   zone: 'Trading Command',  spec: 'Signal Generation',   task: 'Running RSI-14 scan',     color: '#a855f7', room: 0, col: 2,   row: 1.5 },
  { name: 'Aisha Okonkwo',  emoji: '👩', role: 'Quant Analyst',   zone: 'Trading Command',  spec: 'MACD + Sentiment',    task: 'Backtesting GPIQ model',  color: '#a855f7', room: 0, col: 7,   row: 1.5 },
  // Floor 2 — Research Wing
  { name: 'Dr. Emily Zhao', emoji: '👩', role: 'Research Analyst', zone: 'Research Wing',   spec: 'Equity Research',     task: 'Analyzing NVDA catalysts', color: '#00c8ff', room: 1, col: 2,   row: 1.5 },
  { name: 'Marcus Webb',    emoji: '👨', role: 'Research Analyst', zone: 'Research Wing',   spec: 'Macro & ETF',         task: 'CPI scenario modeling',   color: '#00c8ff', room: 1, col: 4.5, row: 2.5 },
  { name: 'Nina Patel',     emoji: '👩', role: 'Senior Analyst',  zone: 'Research Wing',    spec: 'AI / Tech Sector',    task: 'RKLB thesis update',      color: '#00c8ff', room: 1, col: 7,   row: 1.5 },
  // Floor 1 — Risk & Execution Wing
  { name: 'Sam Rivera',     emoji: '🧑', role: 'Risk Manager',    zone: 'Risk & Execution', spec: 'Risk Assessment',     task: 'Phase 1 risk review',     color: '#ff6b35', room: 2, col: 2,   row: 1.5 },
  { name: 'Chris Morgan',   emoji: '👨', role: 'Risk Analyst',    zone: 'Risk & Execution', spec: 'Drawdown Monitoring', task: 'Checking VaR limits',     color: '#ff6b35', room: 2, col: 4.5, row: 1.5 },
  { name: 'Jordan Lee',     emoji: '🧑', role: 'Execution Trader', zone: 'Risk & Execution', spec: 'Order Execution',    task: 'Placing sell orders',     color: '#00e676', room: 2, col: 2,   row: 3.5 },
  { name: 'Taylor Kim',     emoji: '👩', role: 'Execution Trader', zone: 'Risk & Execution', spec: 'Trade Settlement',   task: 'CPI prep — SGOV deploy',  color: '#00e676', room: 2, col: 4.5, row: 3.5 },
];

// ── Room definitions ──
const ROOMS = [
  {
    name: 'Trading Command Center', nameTh: 'ศูนย์บัญชาการซื้อขาย', floor: 3,
    ox: 240, oy: 80, cols: 10, rows: 7,
    fl: '#2e1a0e', flEdge: '#1a0d06',
    wL: '#253b6b', wR: '#172c52',
    wTop: '#1f3363',
    accent: '#ffb800',
    furniture: [
      {type:'desk', col:4, row:2}, {type:'desk', col:2, row:1}, {type:'desk', col:7, row:1},
      {type:'desk', col:1, row:4}, {type:'desk', col:8, row:4},
      {type:'plant', col:0, row:0}, {type:'plant', col:9, row:0},
      {type:'plant', col:0, row:6}, {type:'server', col:9, row:5},
    ]
  },
  {
    name: 'Research Wing', nameTh: 'ฝ่ายวิจัยการลงทุน', floor: 2,
    ox: 590, oy: 235, cols: 10, rows: 7,
    fl: '#0e1e30', flEdge: '#061220',
    wL: '#1a3a5c', wR: '#0f2740',
    wTop: '#163356',
    accent: '#00c8ff',
    furniture: [
      {type:'desk', col:2, row:1}, {type:'desk', col:4, row:2}, {type:'desk', col:7, row:1},
      {type:'desk', col:1, row:4}, {type:'desk', col:8, row:3},
      {type:'plant', col:0, row:0}, {type:'plant', col:9, row:0},
      {type:'board', col:5, row:0},
    ]
  },
  {
    name: 'Risk & Execution Wing', nameTh: 'ฝ่ายบริหารความเสี่ยงและซื้อขาย', floor: 1,
    ox: 940, oy: 385, cols: 10, rows: 7,
    fl: '#0c1e14', flEdge: '#061410',
    wL: '#1a3a2a', wR: '#0f2820',
    wTop: '#163326',
    accent: '#00e676',
    furniture: [
      {type:'desk', col:2, row:1}, {type:'desk', col:4, row:1}, {type:'desk', col:7, row:1},
      {type:'desk', col:2, row:3}, {type:'desk', col:4, row:3},
      {type:'plant', col:0, row:0}, {type:'plant', col:9, row:0},
      {type:'server', col:9, row:5}, {type:'server', col:8, row:5},
    ]
  },
];

// ── Animation state ──
let t = 0;
const agentPhase = AGENTS.map(() => Math.random() * Math.PI * 2);
const monitorPhase = [];
for (let i = 0; i < 20; i++) monitorPhase.push(Math.random() * Math.PI * 2);

// ── Hit areas for click detection ──
const hitAreas = [];

// ── Draw helpers ──
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

function drawDiamondTile(sx, sy, fill, stroke) {
  ctx.beginPath();
  ctx.moveTo(sx, sy - TH/2);
  ctx.lineTo(sx + TW/2, sy);
  ctx.lineTo(sx, sy + TH/2);
  ctx.lineTo(sx - TW/2, sy);
  ctx.closePath();
  ctx.fillStyle = fill;
  ctx.fill();
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = .5; ctx.stroke(); }
}

function drawWallLeft(sx, sy, color, h) {
  ctx.beginPath();
  ctx.moveTo(sx - TW/2, sy);
  ctx.lineTo(sx, sy + TH/2);
  ctx.lineTo(sx, sy + TH/2 - h);
  ctx.lineTo(sx - TW/2, sy - h);
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,.3)';
  ctx.lineWidth = .5;
  ctx.stroke();
}

function drawWallRight(sx, sy, color, h) {
  ctx.beginPath();
  ctx.moveTo(sx, sy + TH/2);
  ctx.lineTo(sx + TW/2, sy);
  ctx.lineTo(sx + TW/2, sy - h);
  ctx.lineTo(sx, sy + TH/2 - h);
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,.3)';
  ctx.lineWidth = .5;
  ctx.stroke();
}

function drawWallTopLeft(sx, sy, color) {
  ctx.beginPath();
  ctx.moveTo(sx - TW/2, sy - WH);
  ctx.lineTo(sx, sy - TH/2 - WH);
  ctx.lineTo(sx, sy - TH/2);
  ctx.lineTo(sx - TW/2, sy);
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
}

function drawBox3D(sx, sy, w, h, d, topC, leftC, rightC) {
  // top face
  ctx.beginPath();
  ctx.moveTo(sx, sy - d);
  ctx.lineTo(sx + w, sy - d + w * TH/TW);
  ctx.lineTo(sx + w - h, sy - d + (w+h) * TH/TW);
  ctx.lineTo(sx - h, sy - d + h * TH/TW);
  ctx.closePath();
  ctx.fillStyle = topC; ctx.fill();
  // left face
  ctx.beginPath();
  ctx.moveTo(sx - h, sy - d + h * TH/TW);
  ctx.lineTo(sx + w - h, sy - d + (w+h) * TH/TW);
  ctx.lineTo(sx + w - h, sy + (w+h) * TH/TW);
  ctx.lineTo(sx - h, sy + h * TH/TW);
  ctx.closePath();
  ctx.fillStyle = leftC; ctx.fill();
  // right face
  ctx.beginPath();
  ctx.moveTo(sx + w, sy - d + w * TH/TW);
  ctx.lineTo(sx + w, sy + w * TH/TW);
  ctx.lineTo(sx + w - h, sy + (w+h) * TH/TW);
  ctx.lineTo(sx + w - h, sy - d + (w+h) * TH/TW);
  ctx.closePath();
  ctx.fillStyle = rightC; ctx.fill();
}

// ── Draw a single room ──
function drawRoom(room, animT) {
  const {ox, oy, cols, rows, fl, flEdge, wL, wR, wTop, accent} = room;

  // Back walls (row=0 column) — left wall
  for (let r = 0; r <= rows; r++) {
    const sx = ix(0, r, ox), sy = iy(0, r, oy);
    drawWallLeft(sx, sy, wL, WH);
    // window stripes
    if (r > 0 && r < rows) {
      const wsx = sx - TW/4;
      const wsy = sy - WH * 0.6;
      ctx.fillStyle = `rgba(${hexToRgb(accent)},.15)`;
      ctx.fillRect(wsx - 4, wsy, 8, WH * 0.35);
      ctx.fillStyle = `rgba(${hexToRgb(accent)},.08)`;
      ctx.fillRect(wsx + 4, wsy + 2, 4, WH * 0.3);
    }
  }
  // Back walls (col=0 row) — right wall
  for (let c = 0; c <= cols; c++) {
    const sx = ix(c, 0, ox), sy = iy(c, 0, oy);
    drawWallRight(sx, sy, wR, WH);
    if (c > 0 && c < cols) {
      const wsx = sx + TW/4;
      const wsy = sy - WH * 0.6;
      ctx.fillStyle = `rgba(${hexToRgb(accent)},.12)`;
      ctx.fillRect(wsx - 4, wsy, 8, WH * 0.35);
    }
  }

  // Top edge wall cap
  const topSx = ix(0, 0, ox), topSy = iy(0, 0, oy);
  drawWallTopLeft(topSx, topSy, wTop);

  // Floor tiles
  for (let c = 0; c < cols; c++) {
    for (let r = 0; r < rows; r++) {
      const sx = ix(c + .5, r + .5, ox);
      const sy = iy(c + .5, r + .5, oy);
      const shade = ((c + r) % 2 === 0) ? fl : flEdge;
      drawDiamondTile(sx, sy, shade, 'rgba(0,0,0,.15)');
    }
  }

  // Floor border glow on edges
  ctx.strokeStyle = `rgba(${hexToRgb(accent)},.4)`;
  ctx.lineWidth = 1.5;
  // Front-left edge
  ctx.beginPath();
  ctx.moveTo(ix(0, rows, ox), iy(0, rows, oy));
  ctx.lineTo(ix(cols, rows, ox), iy(cols, rows, oy));
  ctx.stroke();
  // Front-right edge
  ctx.beginPath();
  ctx.moveTo(ix(cols, rows, ox), iy(cols, rows, oy));
  ctx.lineTo(ix(cols, 0, ox), iy(cols, 0, oy));
  ctx.stroke();
}

// ── Draw furniture ──
function drawFurniture(room, animT) {
  const {ox, oy, accent, furniture} = room;
  furniture.forEach((f, fi) => {
    const sx = ix(f.col + .5, f.row + .5, ox);
    const sy = iy(f.col + .5, f.row + .5, oy);
    if (f.type === 'desk') {
      // Desk box
      drawBox3D(sx - TW*.35, sy - TH*.2, TW*.7, TH*.5, 14,
        '#2a1f14', '#1a1008', '#221508');
      // Monitor screen
      const mon_t = monitorPhase[fi % monitorPhase.length];
      const glow = 0.6 + 0.4 * Math.sin(animT * 0.5 + mon_t);
      const monW = TW * .25, monH = 16;
      const monX = sx - monW/2, monY = sy - 28;
      ctx.fillStyle = `rgba(${hexToRgb(accent)}, ${glow * 0.6})`;
      ctx.fillRect(monX, monY, monW, monH);
      // Mini chart lines on monitor
      ctx.strokeStyle = `rgba(${hexToRgb(accent)}, ${glow})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      for (let i = 0; i < 5; i++) {
        const px = monX + 2 + i * (monW-4)/4;
        const py = monY + monH - 3 - (Math.sin(animT * 0.8 + i + mon_t) + 1) * 4;
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.stroke();
    } else if (f.type === 'plant') {
      // Pot
      ctx.fillStyle = '#3d2010';
      ctx.beginPath(); ctx.arc(sx, sy + 2, 6, 0, Math.PI * 2); ctx.fill();
      // Plant sway
      const sway = Math.sin(animT * 0.4 + fi) * 1.5;
      ctx.fillStyle = '#1a6b2a';
      ctx.beginPath(); ctx.arc(sx + sway, sy - 8, 7, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#22873a';
      ctx.beginPath(); ctx.arc(sx + sway - 4, sy - 12, 4, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(sx + sway + 4, sy - 11, 4, 0, Math.PI * 2); ctx.fill();
    } else if (f.type === 'server') {
      // Server rack
      drawBox3D(sx - TW*.25, sy - TH*.3, TW*.5, TH*.4, 22,
        '#1a2030', '#101520', '#151c28');
      // LED blinks
      for (let i = 0; i < 3; i++) {
        const blink = Math.sin(animT * 2 + i * 2.1 + fi) > 0.3;
        ctx.fillStyle = blink ? '#00e676' : '#003310';
        ctx.beginPath();
        ctx.arc(sx - TW*.1 + i * 5, sy - 28 + i * 4, 2, 0, Math.PI * 2);
        ctx.fill();
      }
    } else if (f.type === 'board') {
      // Whiteboard on back wall
      ctx.fillStyle = '#0d1f38';
      ctx.fillRect(sx - 20, sy - WH * .7, 40, 22);
      ctx.strokeStyle = `rgba(${hexToRgb(accent)},.5)`;
      ctx.lineWidth = 1;
      ctx.strokeRect(sx - 20, sy - WH * .7, 40, 22);
      // Squiggles on board
      ctx.strokeStyle = `rgba(${hexToRgb(accent)},.7)`;
      ctx.lineWidth = .8;
      ctx.beginPath();
      ctx.moveTo(sx - 14, sy - WH * .7 + 8);
      ctx.lineTo(sx - 4, sy - WH * .7 + 12);
      ctx.lineTo(sx + 6, sy - WH * .7 + 7);
      ctx.lineTo(sx + 14, sy - WH * .7 + 14);
      ctx.stroke();
    }
  });
}

// ── Draw agents ──
function drawAgents(room, roomIdx, animT) {
  const {ox, oy, accent} = room;
  AGENTS.filter(a => a.room === roomIdx).forEach((agent, ai) => {
    const phase = agentPhase[AGENTS.indexOf(agent)];
    const bob = Math.sin(animT * 1.2 + phase) * 2.5;
    const sx = ix(agent.col, agent.row, ox);
    const sy = iy(agent.col, agent.row, oy) + bob;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,.3)';
    ctx.beginPath();
    ctx.ellipse(sx, sy + 14, 10, 4, 0, 0, Math.PI * 2);
    ctx.fill();

    // Body
    const bodyColor = agent.color;
    ctx.fillStyle = bodyColor;
    ctx.beginPath();
    ctx.roundRect(sx - 7, sy - 8, 14, 14, 3);
    ctx.fill();
    // Body shading
    ctx.fillStyle = 'rgba(0,0,0,.25)';
    ctx.beginPath();
    ctx.roundRect(sx + 1, sy - 8, 6, 14, [0,3,3,0]);
    ctx.fill();

    // Head
    ctx.fillStyle = '#f5d0a9';
    ctx.beginPath(); ctx.arc(sx, sy - 16, 8, 0, Math.PI * 2); ctx.fill();
    // Hair
    ctx.fillStyle = agent.color === '#ffb800' ? '#3d1a00' : '#1a1a2e';
    ctx.beginPath(); ctx.arc(sx, sy - 20, 6, Math.PI, 0); ctx.fill();

    // Glow ring
    const glowA = 0.5 + 0.5 * Math.sin(animT * 1.5 + phase);
    ctx.strokeStyle = `rgba(${hexToRgb(bodyColor)}, ${glowA * 0.6})`;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(sx, sy - 8, 14, 0, Math.PI * 2); ctx.stroke();

    // Name tag
    ctx.fillStyle = `rgba(${hexToRgb(bodyColor)}, .85)`;
    const label = agent.name.split(' ')[0];
    ctx.font = 'bold 9px Segoe UI, system-ui';
    const tw = ctx.measureText(label).width + 8;
    ctx.beginPath(); ctx.roundRect(sx - tw/2, sy + 10, tw, 13, 3); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(label, sx, sy + 16.5);

    // Hit area registration
    const agentIdx = AGENTS.indexOf(agent);
    hitAreas[agentIdx] = { x: sx - 14, y: sy - 28, w: 28, h: 48, agent };
  });
}

// ── Draw room label ──
function drawRoomLabel(room) {
  const {ox, oy, cols, rows, accent, name, nameTh, floor} = room;
  // Label position: front-left corner
  const sx = ix(0, rows, ox);
  const sy = iy(0, rows, oy) - 8;

  // Floor badge
  ctx.fillStyle = `rgba(${hexToRgb(accent)}, .15)`;
  ctx.strokeStyle = `rgba(${hexToRgb(accent)}, .5)`;
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.roundRect(sx - 4, sy - 36, 70, 34, 6); ctx.fill(); ctx.stroke();

  ctx.fillStyle = `rgba(${hexToRgb(accent)}, .9)`;
  ctx.font = 'bold 10px Segoe UI';
  ctx.textAlign = 'left';
  ctx.fillText(`FLOOR ${floor}`, sx + 2, sy - 24);
  ctx.fillStyle = 'rgba(255,255,255,.9)';
  ctx.font = 'bold 9px Segoe UI';
  ctx.fillText(name, sx + 2, sy - 13);
  ctx.fillStyle = `rgba(${hexToRgb(accent)}, .6)`;
  ctx.font = '8px Segoe UI';
  ctx.fillText(nameTh, sx + 2, sy - 4);
}

// ── Draw connector lines between rooms ──
function drawConnectors() {
  const r0 = ROOMS[0], r1 = ROOMS[1], r2 = ROOMS[2];
  // Edge between room 0 and room 1
  const sx0 = ix(r0.cols, r0.rows, r0.ox), sy0 = iy(r0.cols, r0.rows, r0.oy);
  const sx1 = ix(0, 0, r1.ox), sy1 = iy(0, 0, r1.oy);
  ctx.strokeStyle = 'rgba(255,184,0,.2)';
  ctx.lineWidth = 1.5;
  ctx.setLineDash([6, 4]);
  ctx.beginPath(); ctx.moveTo(sx0, sy0); ctx.lineTo(sx1, sy1 - WH); ctx.stroke();

  const sx1b = ix(r1.cols, r1.rows, r1.ox), sy1b = iy(r1.cols, r1.rows, r1.oy);
  const sx2 = ix(0, 0, r2.ox), sy2 = iy(0, 0, r2.oy);
  ctx.strokeStyle = 'rgba(0,200,255,.2)';
  ctx.beginPath(); ctx.moveTo(sx1b, sy1b); ctx.lineTo(sx2, sy2 - WH); ctx.stroke();
  ctx.setLineDash([]);
}

// ── Draw ambient particles ──
const particles = Array.from({length:24}, () => ({
  x: Math.random() * IW, y: Math.random() * IH,
  vx: (Math.random()-.5)*.3, vy: -0.2-Math.random()*.3,
  a: Math.random(), size: .5+Math.random()*1.5,
  color: Math.random() > .5 ? '#ffb800' : '#00c8ff'
}));

function drawParticles(animT) {
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    if (p.y < -4) { p.y = IH + 4; p.x = Math.random() * IW; }
    const alpha = 0.1 + 0.15 * Math.sin(animT * 0.5 + p.a * 5);
    ctx.fillStyle = p.color.replace('#', 'rgba(') + `,${alpha})`;
    // Ugh, fix the color format
    const [r, g, b] = [parseInt(p.color.slice(1,3),16), parseInt(p.color.slice(3,5),16), parseInt(p.color.slice(5,7),16)];
    ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
  });
}

// ── Main render loop ──
function render(ts) {
  t = ts * 0.001;

  // Background gradient
  const bg = ctx.createLinearGradient(0, 0, IW, IH);
  bg.addColorStop(0, '#050c1a');
  bg.addColorStop(.5, '#040b17');
  bg.addColorStop(1, '#030810');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, IW, IH);

  // Subtle vignette
  const vig = ctx.createRadialGradient(IW/2, IH/2, IH*.2, IW/2, IH/2, IH*.9);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,.55)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, IW, IH);

  drawParticles(t);

  // Draw rooms back-to-front (room 0 = top-left = first)
  // Render order: room 0, room 1, room 2
  ctx.save();
  drawConnectors();
  ctx.restore();

  ROOMS.forEach((room, ri) => {
    drawRoom(room, t);
    drawFurniture(room, t);
    drawAgents(room, ri, t);
    drawRoomLabel(room);
  });

  // Title overlay
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillStyle = 'rgba(255,184,0,.07)';
  ctx.font = 'bold 60px Segoe UI';
  ctx.fillText('SENTINEL', IW/2, 10);

  requestAnimationFrame(render);
}

// ── Clock ──
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('en', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
setInterval(updateClock, 1000); updateClock();

// ── Agent click / hover ──
const card = document.getElementById('agent-card');
let activeAgent = null;

canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const scale = IW / rect.width;
  const mx = (e.clientX - rect.left) * scale;
  const my = (e.clientY - rect.top) * scale;

  let hit = null;
  hitAreas.forEach(ha => {
    if (ha && mx >= ha.x && mx <= ha.x + ha.w && my >= ha.y && my <= ha.y + ha.h) {
      hit = ha.agent;
    }
  });

  if (hit) {
    showAgentCard(hit, e.clientX, e.clientY);
  } else {
    card.classList.remove('show');
    activeAgent = null;
  }
});

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const scale = IW / rect.width;
  const mx = (e.clientX - rect.left) * scale;
  const my = (e.clientY - rect.top) * scale;
  let over = false;
  hitAreas.forEach(ha => {
    if (ha && mx >= ha.x && mx <= ha.x + ha.w && my >= ha.y && my <= ha.y + ha.h) over = true;
  });
  canvas.style.cursor = over ? 'pointer' : 'crosshair';
});
